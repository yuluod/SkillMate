name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v1.0.0"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  PNPM_VERSION: 11.6.0
  RUST_VERSION: 1.96.0

jobs:
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm frontend:test

  rust-test-macos:
    name: Rust tests macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install pinned Rust
        run: rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  rust-test-windows:
    name: Rust tests Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install pinned Rust
        run: rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  rust-test-linux:
    name: Rust tests Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install pinned Rust
        run: rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml --locked

  prepare-release:
    name: Prepare release
    runs-on: ubuntu-22.04
    needs:
      - frontend-test
      - rust-test-macos
      - rust-test-windows
      - rust-test-linux
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}
      release_sha: ${{ steps.validate-release.outputs.release_sha }}
    permissions:
      contents: write

    steps:
      - name: Checkout release tag
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Validate tag, versions, and main ancestry
        id: validate-release
        env:
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          node scripts/release/validate-release.mjs
          git fetch origin main --no-tags
          release_sha="$(git rev-list -n 1 "${TAG_NAME}")"
          if [ -z "${release_sha}" ]; then
            echo "::error title=无效发布 tag::无法解析 ${TAG_NAME}"
            exit 1
          fi
          if ! git merge-base --is-ancestor "${release_sha}" origin/main; then
            echo "::error title=发布来源错误::${TAG_NAME} 不在 main 分支历史中"
            exit 1
          fi
          echo "release_sha=${release_sha}" >> "${GITHUB_OUTPUT}"

      - name: 验证 updater 签名密钥
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error title=缺少 updater 签名密钥::请先配置仓库 Secret：TAURI_SIGNING_PRIVATE_KEY。TAURI_SIGNING_PRIVATE_KEY_PASSWORD 仅在私钥设置了密码时需要。"
            exit 1
          fi

      - name: Reject published release and clear stale draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          release="$(
            gh api "repos/${{ github.repository }}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\") | [.id, .draft] | @tsv" \
              | head -n 1
          )"
          if [ -n "${release}" ]; then
            release_id="$(printf '%s' "${release}" | cut -f1)"
            is_draft="$(printf '%s' "${release}" | cut -f2)"
            if [ "${is_draft}" != "true" ]; then
              echo "::error title=拒绝覆盖正式 Release::${TAG_NAME} 已经公开；请创建新版本 tag"
              exit 1
            fi
            gh api --method DELETE "repos/${{ github.repository }}/releases/${release_id}"
          fi

      - name: Create clean draft release
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          RELEASE_SHA: ${{ steps.validate-release.outputs.release_sha }}
        run: |
          cat > release-body.md <<'EOF'
          ## 安装包

          请从下方 Assets 下载对应系统安装包。

          - macOS Apple Silicon: `_aarch64.dmg`
          - Windows: `_setup.exe`
          - Linux: `.deb` 或 `.rpm`

          当前 macOS 发布包面向 Apple Silicon；Intel Mac 暂不作为 v0.x 发布目标。
          EOF

          release_id="$(
            gh api --method POST "repos/${{ github.repository }}/releases" \
              -f tag_name="${TAG_NAME}" \
              -f target_commitish="${RELEASE_SHA}" \
              -f name="SkillMate ${TAG_NAME}" \
              -f body="$(cat release-body.md)" \
              -F draft=true \
              -F prerelease=false \
              -F generate_release_notes=true \
              --jq ".id"
          )"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pinned Rust
        run: |
          rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal
          rustup target add aarch64-apple-darwin --toolchain "${{ env.RUST_VERSION }}"

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload macOS artifacts
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: "--target aarch64-apple-darwin --bundles app,dmg"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pinned Rust
        run: rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Windows artifacts
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: "--bundles nsis"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: prepare-release
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pinned Rust
        run: rustup toolchain install "${{ env.RUST_VERSION }}" --profile minimal

      - name: Cache Rust
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Linux artifacts
        uses: tauri-apps/tauri-action@1deb371b0cd8bd54025b384f1cd735e725c4060f # v1.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: "--bundles deb,rpm"

  publish-release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs:
      - prepare-release
      - build-macos
      - build-windows
      - build-linux
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version

      - name: Generate updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api "repos/${REPOSITORY}/releases/${RELEASE_ID}" > release.json
          mkdir -p release-signatures
          gh release download "${TAG_NAME}" --pattern "*.sig" --dir release-signatures --repo "${REPOSITORY}"
          RELEASE_JSON=release.json SIGNATURE_DIR=release-signatures OUTPUT_JSON=latest.json \
            node scripts/release/generate-latest.mjs
          gh release upload "${TAG_NAME}" latest.json --clobber --repo "${REPOSITORY}"

          uploaded="$(gh api "repos/${REPOSITORY}/releases/${RELEASE_ID}" --jq '.assets[].name | select(. == "latest.json")')"
          if [ "${uploaded}" != "latest.json" ]; then
            echo "::error title=updater metadata 上传失败::draft release 中未找到 latest.json"
            exit 1
          fi

      - name: Download release assets for supply-chain metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          mkdir -p release-artifacts
          gh release download "${TAG_NAME}" --dir release-artifacts --repo "${REPOSITORY}"
          find release-artifacts -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum | sed 's#release-artifacts/##' > SHA256SUMS

      - name: Generate SPDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0
        with:
          path: release-artifacts
          format: spdx-json
          output-file: skillmate-sbom.spdx.json
          upload-artifact: false

      - name: Attest release artifacts
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            release-artifacts/*
            SHA256SUMS
            skillmate-sbom.spdx.json

      - name: Upload checksums and SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: gh release upload "${TAG_NAME}" SHA256SUMS skillmate-sbom.spdx.json --clobber --repo "${REPOSITORY}"

      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        run: |
          cat > release-payload.json <<'JSON'
          {
            "draft": false,
            "prerelease": false,
            "make_latest": "true"
          }
          JSON
          gh api --method PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" --input release-payload.json
