name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 11.6.0

jobs:
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm frontend:test

  rust-test-macos:
    name: Rust tests macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  rust-test-windows:
    name: Rust tests Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  rust-test-linux:
    name: Rust tests Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  prepare-release:
    name: Prepare release
    runs-on: ubuntu-22.04
    needs:
      - frontend-test
      - rust-test-macos
      - rust-test-windows
      - rust-test-linux

    steps:
      - name: Remove stale release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          release_id="$(gh api "repos/${{ github.repository }}/releases/tags/${TAG_NAME}" --jq ".id" 2>/dev/null || true)"
          if [ -n "${release_id}" ]; then
            gh api --method DELETE "repos/${{ github.repository }}/releases/${release_id}"
          fi

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload macOS artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "SkillMate ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            ## 安装包

            请从下方 Assets 下载对应系统安装包。

            - macOS: `.dmg`
            - Windows: `_setup.exe`
            - Linux: `.deb` 或 `.rpm`

          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: "--bundles dmg"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Windows artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "SkillMate ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            ## 安装包

            请从下方 Assets 下载对应系统安装包。

            - macOS: `.dmg`
            - Windows: `_setup.exe`
            - Linux: `.deb` 或 `.rpm`

          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: "--bundles nsis"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Linux artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          releaseName: "SkillMate ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          releaseBody: |
            ## 安装包

            请从下方 Assets 下载对应系统安装包。

            - macOS: `.dmg`
            - Windows: `_setup.exe`
            - Linux: `.deb` 或 `.rpm`

          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          args: "--bundles deb,rpm"

  publish-release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs:
      - build-macos
      - build-windows
      - build-linux

    steps:
      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          release_id="$(gh api "repos/${{ github.repository }}/releases/tags/${TAG_NAME}" --jq ".id")"
          cat > release-payload.json <<'JSON'
          {
            "draft": false,
            "prerelease": false,
            "make_latest": "true"
          }
          JSON
          gh api --method PATCH "repos/${{ github.repository }}/releases/${release_id}" --input release-payload.json
