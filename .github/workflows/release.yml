name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v1.0.0"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: 22.13.0
  PNPM_VERSION: 11.6.0

jobs:
  frontend-test:
    name: Frontend tests
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm frontend:test

  rust-test-macos:
    name: Rust tests macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  rust-test-windows:
    name: Rust tests Windows
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  rust-test-linux:
    name: Rust tests Linux
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Run Rust tests
        run: cargo test --manifest-path src-tauri/Cargo.toml

  prepare-release:
    name: Prepare release
    runs-on: ubuntu-22.04
    needs:
      - frontend-test
      - rust-test-macos
      - rust-test-windows
      - rust-test-linux
    outputs:
      release_id: ${{ steps.create-release.outputs.release_id }}

    steps:
      - name: 验证 updater 签名密钥
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if [ -z "${TAURI_SIGNING_PRIVATE_KEY}" ]; then
            echo "::error title=缺少 updater 签名密钥::请先配置仓库 Secret：TAURI_SIGNING_PRIVATE_KEY。TAURI_SIGNING_PRIVATE_KEY_PASSWORD 仅在私钥设置了密码时需要。"
            exit 1
          fi

      - name: Remove stale release for this tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          release_id="$(
            gh api "repos/${{ github.repository }}/releases?per_page=100" \
              --jq ".[] | select(.tag_name == \"${TAG_NAME}\") | .id" \
              | head -n 1
          )"
          if [ -n "${release_id}" ]; then
            gh api --method DELETE "repos/${{ github.repository }}/releases/${release_id}"
          fi

      - name: Create clean draft release
        id: create-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          cat > release-body.md <<'EOF'
          ## 安装包

          请从下方 Assets 下载对应系统安装包。

          - macOS Apple Silicon: `_aarch64.dmg`
          - Windows: `_setup.exe`
          - Linux: `.deb` 或 `.rpm`

          当前 macOS 发布包面向 Apple Silicon；Intel Mac 暂不作为 v0.x 发布目标。
          EOF

          release_id="$(
            gh api --method POST "repos/${{ github.repository }}/releases" \
              -f tag_name="${TAG_NAME}" \
              -f target_commitish="${GITHUB_SHA}" \
              -f name="SkillMate ${TAG_NAME}" \
              -f body="$(cat release-body.md)" \
              -F draft=true \
              -F prerelease=false \
              -F generate_release_notes=true \
              --jq ".id"
          )"
          echo "release_id=${release_id}" >> "${GITHUB_OUTPUT}"

  build-macos:
    name: Build macOS
    runs-on: macos-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload macOS artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: "--bundles app,dmg"

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Windows artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: "--bundles nsis"

  build-linux:
    name: Build Linux
    runs-on: ubuntu-22.04
    needs: prepare-release

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and upload Linux artifacts
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.prepare-release.outputs.release_id }}
          tagName: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          args: "--bundles deb,rpm"

  publish-release:
    name: Publish release
    runs-on: ubuntu-22.04
    needs:
      - prepare-release
      - build-macos
      - build-windows
      - build-linux

    steps:
      - name: Publish completed release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
        run: |
          cat > release-payload.json <<'JSON'
          {
            "draft": false,
            "prerelease": false,
            "make_latest": "true"
          }
          JSON
          gh api --method PATCH "repos/${{ github.repository }}/releases/${RELEASE_ID}" --input release-payload.json

      - name: Generate updater metadata
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ID: ${{ needs.prepare-release.outputs.release_id }}
          TAG_NAME: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh api "repos/${REPOSITORY}/releases/${RELEASE_ID}" > release.json
          node <<'NODE'
          const fs = require("fs");
          const { execFileSync } = require("child_process");

          const release = JSON.parse(fs.readFileSync("release.json", "utf8"));
          const repo = process.env.REPOSITORY;
          const tagName = process.env.TAG_NAME;
          const version = tagName.replace(/^v/, "");
          const assets = new Map(release.assets.map((asset) => [asset.name, asset]));
          if (release.draft) {
            throw new Error("release 仍是 draft，不能生成 updater metadata");
          }

          function requireAsset(name) {
            const asset = assets.get(name);
            if (!asset) {
              throw new Error(`缺少 release asset: ${name}`);
            }
            return asset;
          }

          function signatureFor(assetName) {
            const sigAsset = requireAsset(`${assetName}.sig`);
            const signature = execFileSync("gh", [
              "api",
              `repos/${repo}/releases/assets/${sigAsset.id}`,
              "-H",
              "Accept: application/octet-stream",
            ]).toString("utf8").trim();
            if (!signature) {
              throw new Error(`updater 签名为空: ${assetName}.sig`);
            }
            return signature;
          }

          function entry(assetName) {
            requireAsset(assetName);
            const encodedAssetName = encodeURIComponent(assetName);
            return {
              signature: signatureFor(assetName),
              url: `https://github.com/${repo}/releases/download/${tagName}/${encodedAssetName}`,
            };
          }

          const macApp = entry("SkillMate_aarch64.app.tar.gz");
          const windowsNsis = entry(`SkillMate_${version}_x64-setup.exe`);
          const linuxDeb = entry(`SkillMate_${version}_amd64.deb`);
          const linuxRpm = entry(`SkillMate-${version}-1.x86_64.rpm`);
          const platforms = {
            "darwin-aarch64": macApp,
            "darwin-aarch64-app": macApp,
            "linux-x86_64": linuxDeb,
            "linux-x86_64-deb": linuxDeb,
            "linux-x86_64-rpm": linuxRpm,
            "windows-x86_64": windowsNsis,
            "windows-x86_64-nsis": windowsNsis,
          };
          const requiredPlatforms = [
            "darwin-aarch64",
            "darwin-aarch64-app",
            "windows-x86_64",
            "windows-x86_64-nsis",
            "linux-x86_64",
            "linux-x86_64-deb",
            "linux-x86_64-rpm",
          ];
          const missing = requiredPlatforms.filter((platform) => !platforms[platform]);
          if (missing.length > 0) {
            throw new Error(`latest.json 缺少平台: ${missing.join(", ")}`);
          }

          fs.writeFileSync(
            "latest.json",
            `${JSON.stringify({
              version,
              notes: release.body || "",
              pub_date: new Date().toISOString(),
              platforms,
            }, null, 2)}\n`
          );
          NODE
          gh release upload "${TAG_NAME}" latest.json --clobber --repo "${REPOSITORY}"
